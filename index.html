<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ride Console</title>
  <link rel="stylesheet" href="./styles.css">

</head>

<body>
  <div id="app">

<!-- HOME -->
<section id="screen-home" class="screen active">
  <header class="home-header">
    <div>
      <div class="app-kicker">HARLEY DIGITAL COCKPIT</div>
      <h1>Ride Console</h1>
    </div>
    <button class="round-button">⚙</button>
  </header>

  <div class="hero-card">
    <div class="hero-top">
      <div>
        <div class="label">SYSTEM STATUS</div>
        <div class="hero-title">Ready to Ride</div>
      </div>
      <div class="pulse-dot"></div>
    </div>

    <div class="status-grid">
      <div class="status-chip ok">GPS <strong>OK</strong></div>
      <div class="status-chip off">BLE <strong>OFF</strong></div>
      <div class="status-chip ok">MAP <strong>OK</strong></div>
    </div>
  </div>

  <div class="card destination-card">
    <div class="label">LAST DESTINATION</div>
    <div class="destination">新宿駅</div>
    <div class="sub">前回ルートを使用できます</div>
  </div>

  <button class="big-start-button" onclick="showScreen('navi')">
    <span>START NAVIGATION</span>
    <small>案内開始</small>
  </button>

  <div class="action-row">
    <button class="secondary-action" onclick="showScreen('map')">
      目的地変更
    </button>
    <button class="secondary-action">
      BLE接続
    </button>
  </div>

  <div class="bike-card">
    <div>
      <div class="label">BIKE</div>
      <div class="bike-name">FLH1200 Shovelhead Catherine</div>
    </div>
    <div class="bike-values">
      <span>12.6V</span>
      <span>Oil --°C</span>
    </div>
  </div>
</section>

<!-- MAP -->
<section id="screen-map" class="screen">
  <header class="map-header">
    <button class="round-button" onclick="showScreen('home')">‹</button>
    <div>
      <div class="app-kicker">ROUTE PLANNER</div>
      <h1>Map</h1>
    </div>
    <button class="round-button">⋯</button>
  </header>

  <div class="search-card">
    <div class="label">DESTINATION</div>
    <div class="search-input">
      <span>🔍</span>
      <input id="destinationInput" type="text" placeholder="Search destination..." value="新宿駅">
    </div>
  </div>

  <div id="map" class="map-panel">
    <div class="map-overlay">
      <div class="map-title">LIVE MAP</div>
      <div class="map-sub">Route preview</div>
    </div>
  </div>

  <div class="route-section-header">
    <div>
      <div class="label">ROUTES</div>
      <div class="section-title">Choose your ride</div>
    </div>
    <button class="small-link-button">REFRESH</button>
  </div>

  <div class="route-options">
    <button class="route-option selected" onclick="selectRouteOption(this)">
      <div class="route-option-top">
        <div class="route-name">LOCAL</div>
        <div class="route-badge">NO TOLL</div>
      </div>
      <div class="route-main">38 min</div>
      <div class="route-meta">
        <span>12.4 km</span>
        <span>Free</span>
      </div>
    </button>

    <button class="route-option" onclick="selectRouteOption(this)">
      <div class="route-option-top">
        <div class="route-name">EXPRESS</div>
        <div class="route-badge express">FAST</div>
      </div>
      <div class="route-main">24 min</div>
      <div class="route-meta">
        <span>18.1 km</span>
        <span>¥630</span>
      </div>
    </button>
  </div>

  <button class="map-start-button" onclick="showScreen('navi')">
    START
  </button>
</section>
  </div>

  <script src="app.js"></script>
</body>
</html>
